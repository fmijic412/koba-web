<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="SOLKOBA coin">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f5b942"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="38%" r="75%">
      <stop offset="0" stop-color="#0f1622"/>
      <stop offset="1" stop-color="#05080d"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#ring)"/>
  <circle cx="60" cy="60" r="49" fill="url(#face)"/>
  <circle cx="60" cy="60" r="49" fill="none" stroke="#2dd4bf" stroke-opacity="0.25" stroke-width="1"/>
  <!-- still water ripples -->
  <g fill="none" stroke="#2dd4bf" stroke-linecap="round">
    <path d="M30 78 q15 -8 30 0 t30 0" stroke-opacity="0.9" stroke-width="2.4"/>
    <path d="M34 86 q13 -6 26 0 t26 0" stroke-opacity="0.5" stroke-width="2"/>
  </g>
  <!-- kanji: 静 (calm / stillness) -->
  <text x="60" y="58" text-anchor="middle" font-family="'Shippori Mincho', serif" font-size="40" font-weight="700" fill="#f5b942">静</text>
</svg>
